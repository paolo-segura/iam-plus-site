server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Homepage = the Programs hub (no separate index for launch).
  location = / { try_files /programs.html =404; }

  # Self-hosted assets (only if/when we move them off Vercel).
  location /assets/ { try_files $uri =404; }

  # Clean, extensionless URLs: /discovery -> discovery.html, /programs -> programs.html, etc.
  location / { try_files $uri $uri.html $uri/ =404; }

  # Light caching for static html; tune later.
  location ~* \.(?:css|js|png|jpg|jpeg|webp|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public";
  }
}
